<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی کافه جیران</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/misc/Farsi-Digits/font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #0d0d0d; --bg-card: #141414; --text-main: #f5f0e8; --text-muted: #a39e96; --gold: #c9a85b; --gold-dark: #a8873a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Vazirmatn', sans-serif; min-height: 100vh; display: flex; justify-content: center; padding: 20px; background-image: radial-gradient(circle at 20% 30%, #1f1b17 0%, #0a0a0a 80%); }
        .app-container { width: 100%; max-width: 550px; margin-top: 20px; }
        .brand-header { text-align: center; margin-bottom: 30px; }
        .brand-header h1 { font-size: 3rem; color: var(--gold); letter-spacing: 4px; font-weight: 400; text-shadow: 0 0 15px rgba(201, 168, 91, 0.15); }
        .brand-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: -5px; letter-spacing: 2px; }
        .tabs-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 35px; }
        .tab-btn { background: transparent; border: 1px solid #333; color: var(--text-muted); padding: 10px 25px; border-radius: 50px; cursor: pointer; font-family: 'Vazirmatn', sans-serif; font-size: 1rem; transition: all 0.3s ease; }
        .tab-btn:hover { border-color: var(--gold-dark); color: var(--text-main); }
        .tab-btn.active { background: var(--gold); border-color: var(--gold); color: #0d0d0d; font-weight: bold; box-shadow: 0 4px 15px rgba(201, 168, 91, 0.3); }
        .menu-box { background: var(--bg-card); padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid #222; position: relative; overflow: hidden; }
        .category-section { display: none; animation: fadeIn 0.6s ease forwards; }
        .category-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .category-title { font-size: 1.8rem; color: var(--gold); border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .category-title i { font-size: 1.5rem; opacity: 0.8; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #2a2a2a; transition: background 0.2s; padding-left: 5px; padding-right: 5px; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: rgba(201, 168, 91, 0.05); border-radius: 8px; }
        .item-info { display: flex; flex-direction: column; max-width: 70%; }
        .item-name { font-size: 1.1rem; font-weight: 500; }
        .price-tag { background: #1f1f1f; padding: 5px 12px; border-radius: 20px; color: var(--gold); font-weight: bold; font-size: 1rem; border: 1px solid #2a2a2a; }
        #loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; gap: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer-note { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; line-height: 1.8; }
        @media (max-width: 480px) { .brand-header h1 { font-size: 2.5rem; } .tab-btn { padding: 8px 18px; font-size: 0.9rem; } .menu-box { padding: 20px 15px; } .category-title { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="brand-header">
            <h1>جِیران</h1>
            <p>کافه و شیرینی</p>
        </div>
        <div id="tabs-wrapper" class="tabs-container"></div>
        <div class="menu-box">
            <div id="loading-container">
                <div class="spinner"></div>
                <span style="color: #a39e96;">در حال دریافت منو...</span>
            </div>
            <div id="menu-content" style="display: none;"></div>
            <div class="footer-note">
                به منظور حفظ حقوق مشتریان گرامی!<br>
                قیمت انواع باقلوها بر اساس وزن محاسبه می‌شود.
            </div>
        </div>
    </div>

    <script>
        // *** لینک گوگل شیت شما اینجا جایگذاری شده است ***
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4EbNcHP_D2_EKfiLEWbFw8O1CdIVG4Q4DKfYTTfp0jU7soEG4kqlQdNgCmeTktskiMD8QThKSrwvL/pub?output=csv';

        let allData = {}; 

        async function fetchMenu() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                parseCSVAndRender(csvText);
            } catch (error) {
                document.getElementById('loading-container').innerHTML = `<span style="color:#c9a85b;">خطا در ارتباط با سرور. لطفاً صفحه را رفرش کنید.</span>`;
                console.error(error);
            }
        }

        function parseCSVAndRender(csv) {
            const lines = csv.split('\n').filter(line => line.trim() !== '');
            const data = lines.slice(1); 
            const groupedItems = {};

            data.forEach(line => {
                const columns = line.split(',');
                if (columns.length >= 3) {
                    const category = columns[0].trim();
                    const name = columns[1].trim();
                    const price = columns[2].trim();

                    if(!groupedItems[category]) {
                        groupedItems[category] = [];
                    }
                    groupedItems[category].push({ name, price });
                }
            });

            allData = groupedItems;
            renderTabs(Object.keys(groupedItems));
            renderCategory(Object.keys(groupedItems)[0]); 
        }

        function renderTabs(categories) {
            const wrapper = document.getElementById('tabs-wrapper');
            wrapper.innerHTML = '';
            
            const iconMap = {
                'نوشیدنی': 'fa-mug-hot',
                'کنافه': 'fa-utensils',
                'باقلو با شیر عسل': 'fa-cake',
                'باقلو با شهد': 'fa-cake',
                'باقلو با پسته': 'fa-cake',
                'هاوینج': 'fa-cake',
                'سوتلاوا': 'fa-bowl-food'
            };

            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
                const iconClass = iconMap[cat] || 'fa-circle';
                btn.innerHTML = `<i class="fa-solid ${iconClass}" style="margin-left:8px;"></i> ${cat}`;
                btn.onclick = () => switchTab(cat, btn);
                wrapper.appendChild(btn);
            });
        }

        function switchTab(category, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderCategory(category);
        }

        function renderCategory(category) {
            const container = document.getElementById('menu-content');
            container.style.display = 'block';
            document.getElementById('loading-container').style.display = 'none';
            container.innerHTML = '';

            const items = allData[category];
            
            const section = document.createElement('div');
            section.className = 'category-section active';

            const title = document.createElement('div');
            title.className = 'category-title';
            title.innerHTML = `<i class="fa-solid fa-hashtag"></i> ${category}`;
            section.appendChild(title);

            items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                itemDiv.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                    </div>
                    <span class="price-tag">${item.price}</span>
                `;
                section.appendChild(itemDiv);
            });

            container.appendChild(section);
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
