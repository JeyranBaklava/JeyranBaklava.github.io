<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جیران | Jeyran Baklava</title>
    <!-- فونت وزیرمتن برای بخش‌های عادی منو -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0a0806;
            --bg-card: #14110e;
            --text-main: #f5ece1;
            --text-muted: #9f9385;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --font-main: 'Vazirmatn', sans-serif;
            --header-bg: rgba(10, 8, 6, 0.7);
            --shadow-color: rgba(0,0,0,0.8);
            --back-to-top-bg: #14110e;
            --line-thickness: 0.5px;
        }

        /* حالت روز (Light Mode) */
        .light-mode {
            --bg-body: #f4efe9;
            --bg-card: #fffcf8;
            --text-main: #2c2520;
            --text-muted: #6b5e53;
            --header-bg: rgba(244, 239, 233, 0.8);
            --shadow-color: rgba(0,0,0,0.1);
            --back-to-top-bg: #fffcf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 15% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .theme-switch-wrapper {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        .theme-switch {
            background: var(--bg-card);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: all 0.3s ease;
        }
        .theme-switch:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            position: relative;
        }

        /* هدر شیشه‌ای */
        .header-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            padding-top: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: var(--header-bg);
            transition: background 0.5s ease;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        .brand-header {
            text-align: center;
            position: relative;
        }
        
        /* استایل کانتینر لوگو */
        .brand-logo-container {
            display: inline-block;
            width: 150px;
            margin-bottom: 15px;
            transition: all 0.5s ease;
        }
        
        .brand-logo-svg {
            width: 100%;
            height: auto;
            fill: var(--gold);
            filter: drop-shadow(0 0 20px var(--gold-glow));
            transition: fill 0.5s ease, filter 0.5s ease;
        }

        .brand-header p {
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 4px;
            font-weight: 300;
            transition: color 0.5s ease;
        }
        
        .brand-header::after {
            content: '';
            width: 60px;
            height: var(--line-thickness);
            background: var(--gold);
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        /* نوار تبلیغاتی تصادفی */
        .random-tagline-container {
            margin-top: 20px;
            padding: 10px 10px;
            border-top: var(--line-thickness) solid rgba(212, 175, 55, 0.2);
            border-bottom: var(--line-thickness) solid rgba(212, 175, 55, 0.2);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .random-tagline {
            color: var(--gold);
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.9;
            text-align: center;
            animation: taglineFadeIn 0.8s ease forwards;
        }
        @keyframes taglineFadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .menu-box {
            background: var(--bg-card);
            padding: 30px 25px;
            border-radius: 25px;
            box-shadow: 0 20px 60px var(--shadow-color);
            border: 1px solid rgba(212, 175, 55, 0.1);
            position: relative;
            overflow: hidden;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        /* جستجو */
        .search-wrapper {
            position: relative;
            z-index: 5;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: var(--line-thickness) solid rgba(212, 175, 55, 0.2);
            border-radius: 50px;
            padding: 5px 15px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .search-wrapper:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 15px var(--gold-glow);
        }
        .light-mode .search-wrapper {
            background: rgba(255, 255, 255, 0.4);
        }
        .search-wrapper i {
            color: var(--text-muted);
            font-size: 1rem;
        }
        .search-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: var(--font-main);
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 1.1rem;
            width: 100%;
            padding: 12px 0;
        }
        .search-wrapper input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }
        .search-clear-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            display: none;
            transition: color 0.3s ease;
        }
        .search-clear-btn:hover {
            color: var(--gold);
        }
        .search-clear-btn.visible {
            display: block;
        }

        .background-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 1.5s ease, transform 1.5s ease;
            z-index: 0;
        }
        .background-glow.active {
            opacity: 1;
            transform: translateY(50px);
        }

        .category-section {
            position: relative;
            z-index: 1;
            margin-bottom: 40px;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .category-section:last-child { margin-bottom: 0; }
        .category-section.fade-out { opacity: 0; transform: translateY(25px); pointer-events: none; }
        .category-section.fade-in { opacity: 1; transform: translateY(0); }

        .category-title {
            font-size: 1.6rem;
            color: var(--gold);
            border-bottom: var(--line-thickness) solid rgba(212, 175, 55, 0.15);
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .category-title i { 
            font-size: 1.2rem; 
            opacity: 0.7;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: var(--line-thickness) solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .light-mode .menu-item { border-bottom-color: rgba(0, 0, 0, 0.03); }

        .menu-item:active, .menu-item.clicked {
            transform: scale(0.98);
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.15), transparent 70%);
            border-radius: 12px;
            transition: transform 0.1s ease, background 0.1s ease;
        }

        .menu-item:hover {
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            padding-left: 12px;
            padding-right: 12px;
        }

        .item-info { display: flex; flex-direction: column; max-width: 70%; }
        .item-name { 
            font-size: 1.1rem; 
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .price-tag {
            background: transparent;
            padding: 4px 10px;
            color: var(--gold);
            font-weight: 300;
            font-size: 0.95rem;
            border: var(--line-thickness) solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            white-space: nowrap;
        }

        /* ===================================================
           بخش لودینگ با استفاده از مسیرهای دقیق لوگو
           =================================================== */
        #loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            gap: 20px;
        }
        
        /* این دقیقاً از روی لوگوی شما کپی شده است */
        .logo-loader-svg {
            width: 120px;
            height: auto;
            fill: var(--gold);
            animation: shimmerLogo 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes shimmerLogo {
            0% { 
                filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.1)); 
                opacity: 0.5;
                transform: scale(0.95);
            }
            100% { 
                filter: drop-shadow(0 0 30px var(--gold-glow)) drop-shadow(0 0 60px var(--gold-glow)); 
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .loader-subtext {
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .footer-note {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 30px;
            border-top: var(--line-thickness) solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            line-height: 1.8;
            font-weight: 300;
            position: relative;
            z-index: 1;
            transition: color 0.5s ease;
        }
        .light-mode .footer-note { border-top-color: rgba(0, 0, 0, 0.05); }
        
        .footer-note a {
            color: var(--gold);
            text-decoration: none;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 300;
        }
        .footer-note a:hover { color: #fff; }
        .light-mode .footer-note a:hover { color: #000; }

        /* کادر ثبت سفارش */
        .order-box {
            position: relative;
            z-index: 1;
            margin-top: 25px;
            padding: 15px 15px;
            border: var(--line-thickness) solid var(--gold);
            border-radius: 15px;
            background: rgba(212, 175, 55, 0.03);
            text-align: center;
            font-size: 1rem;
            color: var(--text-main);
            letter-spacing: 1px;
            font-weight: 300;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.05);
            transition: background 0.5s ease;
        }
        .light-mode .order-box {
            background: rgba(212, 175, 55, 0.05);
        }

        #back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--back-to-top-bg);
            color: var(--gold);
            border: var(--line-thickness) solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow-color);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 999;
        }
        #back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        #back-to-top:hover {
            transform: scale(1.1);
            background: var(--gold);
            color: #0a0806;
        }

        @media (max-width: 480px) {
            .brand-logo-container { width: 120px; }
            .logo-loader-svg { width: 90px; }
            .theme-switch-wrapper { top: 10px; left: 10px; }
            .header-wrapper { padding-top: 5px; padding-bottom: 10px; }
            .menu-box { padding: 20px 15px; border-radius: 15px; }
            .category-title { font-size: 1.3rem; }
            .menu-item { padding: 10px 0; }
            .search-wrapper input { font-size: 1rem; padding: 10px 0; }
            #back-to-top { width: 45px; height: 45px; bottom: 20px; right: 20px; }
            .random-tagline { font-size: 0.85rem; }
        }
    </style>
</head>

            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

    <!-- دکمه بازگشت به بالا -->
    <button id="back-to-top" title="بازگشت به بالا">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

                <p>MENU</p>
                
                <div class="random-tagline-container">
                    <div id="random-tagline" class="random-tagline"></div>
                </div>
            </div>
        </div>
        
        <div class="menu-box">
            <div class="background-glow" id="bg-glow"></div>

            <!-- بخش لودینگ با لوگوی دقیق -->

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4EbNcHP_D2_EKfiLEWbFw8O1CdIVG4Q4DKfYTTfp0jU7soEG4kqlQdNgCmeTktskiMD8QThKSrwvL/pub?output=csv';

        let allData = {}; 
        let allRawItems = []; 

        const taglines = [
            "جیران؛ جایی که عطر باقلو با طعم قهوه گره می‌خورد.",
            "طعمی که از دل تاریخ می‌آید؛ برای لحظات امروز شما.",
            "جیران؛ کافه‌ای به وسعتِ یک رویای شیرین.",
            "سفری به دنیای طعم‌های اصیل؛ از قهوه‌ی ترک تا باقلوهای ناب.",
            "جیران؛ جایی برای دور هم‌ها و طعم‌های ماندگار.",
            "شیرینیِ زندگی را با جیران بچشید.",
            "یک فنجان قهوه، یک برش باقلو، و یک دنیا آرامش در جیران.",
            "جیران؛ طعم بی‌نهایت.",
            "جیران؛ ناب‌ترین طعم، برای خاص‌ترین لحظات.",
            "جیران؛ جایی برای چشیدنِ لذت.",
            "هر جرعه قهوه در جیران، داستانی تازه است.",
            "جیران؛ جایی که اصالت با مدرنیته گره می‌خورد.",
            "از دل تاریخ تا سفره‌ی امروز؛ طعم جیران.",
            "باقلوهای جیران؛ حاصل دست‌هایی از جنس هنر.",
            "جیران؛ قهوه‌ای برای آغاز، باقلویی برای پایانِ روز.",
            "لذت واقعی را در جیران تجربه کنید.",
            "جیران؛ جایی برای خاطره‌سازی با طعم.",
            "بهترین دسرها، بهترین قهوه‌ها؛ همه در جیران.",
            "فقط یک قدم تا بهشتِ طعم‌ها؛ جیران.",
            "جیران؛ جایی که هر لقمه‌اش یک شعر است.",
            "چای‌های جیران؛ گرمای یک عصر پاییزی.",
            "جیران؛ جایی برای استراحت از دنیای شلوغ.",
            "طعم ناب باقلو، با یک فنجان قهوه‌ی ترک.",
            "جیران؛ مهدِ شیرینی‌های بی‌نظیر.",
            "لحظات شیرین خود را به جیران بسپارید.",
            "جیران؛ عطرِ قدم‌هایتان را با طعمی ماندگار همراه می‌کند.",
            "از دلِ هنر تا کامِ شما؛ جیران.",
            "جیران؛ فقط کافیست یک بار امتحان کنید.",
            "سفارش یک باقلو از جیران، سفارش یک لبخند است.",
            "جیران؛ جایی که همه‌چیز طعمِ خوب می‌دهد.",
            "بینِ قهوه و شیرینی‌های جیران، انتخاب سخت است!",
            "جیران؛ جایی برای گریزِ شیرین از روزمرگی.",
            "مهمانی‌هایتان را با باقلوهای جیران خاص‌تر کنید.",
            "جیران؛ از طعمِ سنتی تا چاشنیِ امروزی.",
            "هربار که جیران را می‌بینید، حسِ خوبِ یک عصرِ طلایی.",
            "جیران؛ جایی برای پیدا کردنِ طعمِ گم‌شده.",
            "بهترین باقلوهای شهر، فقط در جیران.",
            "جیران؛ عطرِ قهوه و شیرینی، مهمانِ همیشگیِ خانه‌ی شما.",
            "یک دنیا طعم، در یک فنجان و یک بشقاب کوچک.",
            "جیران؛ جایی برای پذیراییِ بی‌نقص.",
            "چشیدنِ جیران، یعنی چشیدنِ هنرِ یک شیرینی‌پز.",
            "جیران؛ ساده‌ترین راه برای خوشحال کردنِ خود و دیگران.",
            "صبح‌ها با قهوه‌ی جیران، شب‌ها با شیرینی‌هایش.",
            "جیران؛ جایی که طعم، به‌یادماندنی می‌شود.",
            "برای یک لحظه‌ی خاص، تنها یک انتخاب دارید؛ جیران.",
            "جیران؛ جایی برای عاشقانِ قهوه و شیرینی.",
            "از میانِ همه‌ی کافه‌ها، جیران را انتخاب کنید.",
            "جیران؛ جایی که حسِ خانه را با طعمِ کافه تجربه می‌کنید.",
            "یادتان نرود که بهترین‌ها، در جیران منتظر شما هستند.",
            "جیران؛ عطرِ خاطراتِ شیرین."
        ];

        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        let isLightMode = false;

        themeToggle.addEventListener('click', () => {
            isLightMode = !isLightMode;
            body.classList.toggle('light-mode', isLightMode);
            themeToggle.innerHTML = isLightMode ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        });

        const backToTopBtn = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        });
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        function showRandomTagline() {
            const randomIndex = Math.floor(Math.random() * taglines.length);
            const selectedTagline = taglines[randomIndex];
            const taglineElement = document.getElementById('random-tagline');
            
            taglineElement.style.opacity = '0';
            taglineElement.style.transform = 'translateY(8px)';
            
            setTimeout(() => {
                taglineElement.textContent = '✦ ' + selectedTagline + ' ✦';
                taglineElement.style.opacity = '1';
                taglineElement.style.transform = 'translateY(0)';
            }, 300);
        }

        async function fetchMenu() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                parseCSVAndRender(csvText);
            } catch (error) {
                document.getElementById('loading-container').innerHTML = `<span style="color: #d4af37;">خطا در ارتباط. لطفاً صفحه را رفرش کنید.</span>`;
            }
        }

        function parseCSVAndRender(csv) {
            const lines = csv.split('\n').filter(line => line.trim() !== '');
            const data = lines.slice(1); 
            const groupedItems = {};
            allRawItems = []; 

            data.forEach(line => {
                const columns = line.split(',');
                if (columns.length >= 3) {
                    const category = columns[0].trim();
                    const name = columns[1].trim();
                    const price = columns[2].trim();
                    if(!groupedItems[category]) {
                        groupedItems[category] = [];
                    }
                    groupedItems[category].push({ name, price });
                    allRawItems.push({ category, name, price });
                }
            });

            allData = groupedItems;
            renderAllCategories(Object.keys(groupedItems)); 
        }

        function renderAllCategories(categories, searchTerm = '') {
            const container = document.getElementById('menu-content');
            container.style.display = 'block';
            document.getElementById('loading-container').style.display = 'none';
            container.innerHTML = '';

            const iconMap = {
                'نوشیدنی': 'fa-mug-hot',
                'کنافه': 'fa-utensils',
                'باقلو با شیر عسل': 'fa-cake',
                'باقلو با شهد': 'fa-cake',
                'باقلو با پسته': 'fa-cake',
                'هاوینج': 'fa-cake',
                'سوتلاوا': 'fa-bowl-food'
            };

            if (searchTerm.trim() !== '') {
                const searchLowerCase = searchTerm.toLowerCase();
                const foundItems = allRawItems.filter(item => 
                    item.name.includes(searchLowerCase) || 
                    item.category.includes(searchLowerCase)
                );
                
                if (foundItems.length > 0) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'category-section';
                    const title = document.createElement('div');
                    title.className = 'category-title';
                    title.innerHTML = `<i class="fa-solid fa-search" style="font-size:1.2rem;"></i> نتایج جستجو برای "${searchTerm}"`;
                    wrapper.appendChild(title);

                    foundItems.forEach(item => {
                        const itemDiv = createMenuItem(item.name, item.price);
                        wrapper.appendChild(itemDiv);
                    });
                    container.appendChild(wrapper);
                } else {
                    container.innerHTML = `<div style="text-align:center; padding:30px 0; color: var(--text-muted); font-size:1.1rem;">موردی برای "${searchTerm}" یافت نشد.</div>`;
                }
                return;
            }

            categories.forEach((cat) => {
                const items = allData[cat];
                
                const section = document.createElement('div');
                section.className = 'category-section';
                section.dataset.category = cat;

                const title = document.createElement('div');
                title.className = 'category-title';
                const iconClass = iconMap[cat] || 'fa-circle';
                title.innerHTML = `<i class="fa-solid ${iconClass}"></i> ${cat}`;
                section.appendChild(title);

                items.forEach(item => {
                    const itemDiv = createMenuItem(item.name, item.price);
                    section.appendChild(itemDiv);
                });

                container.appendChild(section);
            });

            setupScrollAnimation();
        }

        function createMenuItem(name, price) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'menu-item';
            const persianPrice = toPersianDigits(price);
            itemDiv.innerHTML = `
                <div class="item-info">
                    <span class="item-name">${name}</span>
                </div>
                <span class="price-tag">${persianPrice} تومان</span>
            `;
            itemDiv.addEventListener('click', function() {
                this.classList.add('clicked');
                setTimeout(() => this.classList.remove('clicked'), 300);
            });
            return itemDiv;
        }

        function toPersianDigits(num) {
            const persianDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
            return num.toString().replace(/\d/g, d => persianDigits[d]);
        }

        function setupScrollAnimation() {
            const sections = document.querySelectorAll('.category-section');
            const glow = document.getElementById('bg-glow');
            
            const observerOptions = {
                root: null,
                rootMargin: '-10% 0px -10% 0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.remove('fade-out');
                        entry.target.classList.add('fade-in');
                        glow.classList.add('active');
                    } else {
                        entry.target.classList.remove('fade-in');
                        entry.target.classList.add('fade-out');
                        glow.classList.remove('active');
                    }
                });
            }, observerOptions);

            sections.forEach(section => {
                observer.observe(section);
            });
        }

        function setupSearch() {
            const searchWrapper = document.createElement('div');
            searchWrapper.className = 'search-wrapper';
            searchWrapper.innerHTML = `
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="جستجو در منو (مثلاً: باقلو، چای، کنافه)...">
                <button class="search-clear-btn" id="search-clear-btn"><i class="fa-solid fa-xmark"></i></button>
            `;

            const menuBox = document.querySelector('.menu-box');
            const loadingContainer = document.getElementById('loading-container');
            menuBox.insertBefore(searchWrapper, loadingContainer);

            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('search-clear-btn');

            searchInput.addEventListener('input', (e) => {
                const val = e.target.value;
                if (val.length > 0) {
                    clearBtn.classList.add('visible');
                } else {
                    clearBtn.classList.remove('visible');
                }
                
                if (Object.keys(allData).length > 0) {
                    const categories = Object.keys(allData);
                    const container = document.getElementById('menu-content');
                    container.innerHTML = '';
                    renderAllCategories(categories, val);
                }
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.classList.remove('visible');
                if (Object.keys(allData).length > 0) {
                    const categories = Object.keys(allData);
                    const container = document.getElementById('menu-content');
                    container.innerHTML = '';
                    renderAllCategories(categories, '');
                }
                searchInput.focus();
            });
        }

        window.onload = function() {
            showRandomTagline();
            fetchMenu();
            setupSearch();
        };
    </script>
